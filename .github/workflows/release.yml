name: Release to GitHub Packages

# Cuts a release when a `release/<version>` tag is pushed (e.g. release/0.0.1). The promote tooling that pushes the tag
# also stamps the same version into the root POM's <revision>, so this build needs no -Drevision — it reads the
# committed version. A guard below fails the run if the tag and the committed <revision> disagree.
#
# INTERIM target: GitHub Packages (https://maven.pkg.github.com/mzingg/zems-public), via the standard
# maven-deploy-plugin (the distributionManagement repo in the root POM). Maven Central is deferred until Maven 4 rc-6 —
# on rc-5 the central-publishing plugin uploads the inference-only build POM and Central rejects it. NOTE: consuming
# from GitHub Packages requires a GitHub token even for public packages.

on:
  push:
    tags:
      - 'release/**'

permissions:
  contents: read
  packages: write # deploy to this repo's GitHub Packages with the automatic GITHUB_TOKEN

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache local Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Check tag matches committed revision
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#release/}"
          POM_VERSION=$(sed -n 's:.*<revision>\(.*\)</revision>.*:\1:p' pom.xml | head -1)
          echo "tag=$TAG_VERSION committed <revision>=$POM_VERSION"
          if [ "$TAG_VERSION" != "$POM_VERSION" ]; then
            echo "::error::release tag ($TAG_VERSION) does not match committed <revision> ($POM_VERSION)"
            exit 1
          fi

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: nix develop .#release --command bash -c 'echo "$GPG_PRIVATE_KEY" | gpg --batch --import'

      - name: Deploy to GitHub Packages
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          # GitHub Packages Basic auth: GITHUB_ACTOR is the username, the token below the password — feeding the
          # `github` server in release-settings.xml via ${env.GITHUB_ACTOR}/${env.GITHUB_TOKEN}.
          # NOT the automatic GITHUB_TOKEN: even with packages:write it is refused (401) when CREATING a brand-new
          # package (first publish of dev.zems.lib:value). A classic PAT with write:packages is required; it is stored
          # as the PACKAGES_TOKEN secret and fed through the GITHUB_TOKEN env so the settings file needs no change.
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        # Sequential (no -T): gpg-agent does not handle parallel signing reliably.
        run: |
          echo "Releasing dev.zems.lib:value:${GITHUB_REF_NAME#release/} to GitHub Packages"
          # Masked probe: confirms both credentials survive into the nix subshell (prints `present`, never the value).
          # Temporary — drop once a release goes green.
          nix develop .#release --command bash -c '
            echo "github-server creds in nix shell — actor:${GITHUB_ACTOR:+present} token:${GITHUB_TOKEN:+present}"
            mvn -B -Prelease,releaseGate \
              -s .mvn/release-settings.xml \
              -pl 10_lib/value -am \
              deploy'
