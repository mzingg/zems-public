# Template for local-only environment variables sourced by the nix develop
# shellHook. Each KEY=VALUE line becomes an exported env var in the dev shell.
#
# Usage:
#   cp .nix/env.template.conf .nix/env.local.conf
#   # then fill in real values in env.local.conf (which is gitignored)
#
# When adding a new required env var to the project, add it here with a
# placeholder describing the expected value, NOT the value itself. CI mirrors
# these via GitHub secrets in .github/workflows/build.yml.

NVD_API_KEY=<API key for downloading OWASP database>

# --- Release / Maven Central (used by the PUBLIC repo only) ---
# Publishing happens in zems-public, not this monorepo (see 80_ops/promote/README.md). There these are GitHub Actions
# secrets for .github/workflows/release.yml; locally (in a zems-public checkout) fill them in for a hand-deploy
# (mvn -Prelease ... -s .mvn/release-settings.xml). In this monorepo they are unused — leave them blank.
# Central Portal user token (Portal -> Account -> Generate User Token), read by central-publishing-maven-plugin.
CENTRAL_TOKEN_USERNAME=<Central Portal token username>
CENTRAL_TOKEN_PASSWORD=<Central Portal token password>
# Passphrase of the GPG key that signs released artifacts (read by maven-gpg-plugin).
MAVEN_GPG_PASSPHRASE=<passphrase of the release signing GPG key>
